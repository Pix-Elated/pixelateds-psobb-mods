# GitHub Actions release workflow.
#
# Fires on tag push (v*.*.*) OR on manual dispatch. Builds
# pixelated_mods.addon32 with MSVC x86, packages it with the data
# files + readme + install instructions + license, and publishes a
# single release zip on the tag's GitHub Release:
#
#   pixelateds-psobb-mods-<ver>.zip
#     pixelated_mods.addon32 + the six data files + README + INSTALL.
#     Users drop the contents into their existing ReShade add-on
#     install next to PsoBB.exe. ~275 KB.
#
# The addon build uses MSVC x86 (same toolchain build.bat uses locally).

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override version string (e.g. v0.1.0-rc1). Leave blank to use the commit short SHA.'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write  # needed to create a release on tag push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version string
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            ver="${{ github.event.inputs.tag }}"
          else
            ver="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${ver}" >> "${GITHUB_OUTPUT}"
          echo "Building version: ${ver}"

      # --- pixelated_mods.addon32 (MSVC x86) --------------------------------

      - name: Configure MSVC x86 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure addon (CMake, Ninja, Release)
        shell: cmd
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -S . -B build

      - name: Build addon
        shell: cmd
        run: |
          cmake --build build --config Release

      - name: Verify addon output
        shell: bash
        run: |
          ls -la build/pixelated_mods.addon32
          test -f build/pixelated_mods.addon32

      # --- Stage release payload --------------------------------------------

      - name: Stage release payload
        shell: bash
        run: |
          stage="stage"
          mkdir -p "$stage"
          cp build/pixelated_mods.addon32             "$stage/"
          # Item / tech / special names now come from the game's
          # ItemPMT + unitxt tables at runtime — no text files
          # needed for those any more.
          cp pixelated_mods_rares.txt                 "$stage/"
          cp pixelated_mods_hidden.txt                "$stage/"
          cp pixelated_mods_monster_hidden.txt        "$stage/"
          cp pixelated_mods_alert.wav                 "$stage/"
          cp pixelated_mods_mag_chime.wav             "$stage/"

          # Optional DirectSound → OpenAL Soft wrapper (DSOAL). Fixes
          # intermittent audio stuttering / choppy music caused by
          # Windows' legacy DirectSound emulation. Users can delete
          # these three files to revert to system DirectSound.
          mkdir -p "$stage/audio_fix"
          cp deps/dsoal/dsound.dll                    "$stage/audio_fix/"
          cp deps/dsoal/dsoal-aldrv.dll               "$stage/audio_fix/"
          cp deps/dsoal/alsoft.ini                    "$stage/audio_fix/"
          cp deps/dsoal/DSOAL-License.txt             "$stage/audio_fix/"
          cp deps/dsoal/DSOAL-ReadMe.txt              "$stage/audio_fix/"
          cp deps/dsoal/DSOAL-Version.txt             "$stage/audio_fix/"
          cp deps/dsoal/OpenALSoft-License.txt        "$stage/audio_fix/"
          cp deps/dsoal/OpenALSoft-License_BSD-3Clause.txt "$stage/audio_fix/"
          cp deps/dsoal/OpenALSoft-License_PFFFT.txt  "$stage/audio_fix/"
          cp deps/dsoal/OpenALSoft-ReadMe.txt         "$stage/audio_fix/"
          cp deps/dsoal/OpenALSoft-Version.txt        "$stage/audio_fix/"

          cp README.md                                "$stage/"
          cp INSTALL.txt                              "$stage/"
          cp LICENSE                                  "$stage/"
          ls -la "$stage/"
          ls -la "$stage/audio_fix/"

      # --- Stage cosmetic bundle payload ------------------------------------

      - name: Stage cosmetic bundle payload
        shell: bash
        run: |
          cb="cosmetic_stage"
          mkdir -p "$cb"
          # Only files we authored or configured ourselves — the third-
          # party shader packs (iMMERSE, PD80, etc.) and texture mods
          # have licenses that forbid redistribution. cosmetic_bundle/
          # README.md links to each source for the user to install.
          cp cosmetic_bundle/ReShade.ini           "$cb/"
          cp cosmetic_bundle/PSOBB_HD.ini          "$cb/"
          cp cosmetic_bundle/PSOBB_NoEffects.ini   "$cb/"
          cp cosmetic_bundle/README.md             "$cb/"
          cp LICENSE                               "$cb/"
          ls -la "$cb/"

      # --- Package zips -----------------------------------------------------

      - name: Package main zip
        shell: bash
        run: |
          ver="${{ steps.version.outputs.version }}"
          zip="pixelateds-psobb-mods-${ver}.zip"
          (cd stage && 7z a -tzip "../${zip}" . >/dev/null)
          echo "zip=${zip}" >> "${GITHUB_ENV}"
          ls -la "${zip}"

      - name: Package cosmetic bundle zip
        shell: bash
        run: |
          ver="${{ steps.version.outputs.version }}"
          czip="pixelateds-psobb-cosmetic-bundle-${ver}.zip"
          (cd cosmetic_stage && 7z a -tzip "../${czip}" . >/dev/null)
          echo "czip=${czip}" >> "${GITHUB_ENV}"
          ls -la "${czip}"

      - name: Upload workflow artifacts (non-release runs)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: pixelateds-psobb-mods-${{ steps.version.outputs.version }}
          path: |
            ${{ env.zip }}
            ${{ env.czip }}
          if-no-files-found: error

      - name: Create GitHub Release (tag push only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.zip }}
            ${{ env.czip }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
