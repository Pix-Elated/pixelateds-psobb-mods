; PSOBB_NoEffects.ini
; Temporary ReShade preset that loads no effects at all — used to
; isolate whether texture weirdness (splash/trap visual confusion)
; is caused by ReShade's post-processing stack or by the underlying
; renderer (DXVK/Vulkan).
;
; To activate: set `PresetPath=.\PSOBB_NoEffects.ini` in ReShade.ini
; To revert:   set `PresetPath=.\PSOBB_HD.ini`   in ReShade.ini
;
; ReShade itself still loads and our addon still runs; there are
; simply zero shader techniques applied, so the game renders as if
; ReShade were only passing the image through untouched.

PreprocessorDefinitions=RESHADE_DEPTH_INPUT_IS_UPSIDE_DOWN=0,RESHADE_DEPTH_INPUT_IS_REVERSED=0,RESHADE_DEPTH_INPUT_IS_LOGARITHMIC=0,RESHADE_DEPTH_LINEARIZATION_FAR_PLANE=1000.0,RESHADE_DEPTH_INPUT_Y_SCALE=1.0,RESHADE_DEPTH_INPUT_X_SCALE=1.0,RESHADE_DEPTH_INPUT_Y_OFFSET=0.0,RESHADE_DEPTH_INPUT_X_OFFSET=0.0
Techniques=
TechniqueSorting=
